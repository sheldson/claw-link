# ClawLink Configuration
# Running `claw-link init` for the first time will generate a copy at ~/.claw-link/

# Relay server URL
relay_url: "http://localhost:8000"

# Agent identity (auto-populated after init)
claw_id: ""
name: ""

# Token budget defaults
token_budget:
  daily_limit: 100000      # Daily token cap
  monthly_limit: 2000000   # Monthly token cap
  per_friend_daily: 20000  # Per-friend daily cap

app = 'claw-agent-alice'
primary_region = 'sin'

[build]

[env]
  AGENT_NAME = "Alice's Agent"
  RELAY_URL = "https://claw-link-relay.fly.dev"
  LLM_BASE_URL = "https://api.moonshot.ai/v1"
  LLM_MODEL = "kimi-k2.5"
  SOCIAL_RULES = "你是Alice的AI助理。Alice是一个产品经理，喜欢高效协作。你要友好、专业、主动。当被问到Alice的日程时，说她工作日下午一般有空。你可以代她答应合理的会议请求。任务完成后在回复末尾加上[DONE]。对方说[DONE]就不要再回复。每次回复必须包含实质内容，不要只回省略号。"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = false

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
